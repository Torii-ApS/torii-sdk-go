openapi: 3.1.0
info:
  description: Server-to-server API (BAPI) for backend SDKs. Authenticated with a
    secret key (Bearer sk_live_* / sk_test_*).
  title: Torii Backend API
  version: v1
servers:
- description: Production backend API
  url: https://api.torii.so
tags:
- description: Escape-hatch origins for non-web stacks (secret key auth)
  name: Allowed Origins
- description: Server user management endpoints (secret key auth)
  name: Server Users
- description: Server session management endpoints (secret key auth)
  name: Server Sessions
paths:
  /api/server/v1/allowed-origins:
    get:
      operationId: list
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AllowedOriginsResponse"
          description: OK
      summary: List escape-hatch origins for this environment
      tags:
      - Allowed Origins
    put:
      description: Full origins incl. non-http schemes (e.g. capacitor://localhost).
        Replaces the list.
      operationId: set
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetAllowedOriginsRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AllowedOriginsResponse"
          description: OK
      summary: Replace the escape-hatch origins for this environment
      tags:
      - Allowed Origins
  /api/server/v1/users:
    post:
      description: Creates an end-user in your environment. All body fields are optional;
        supply at minimum an email if you want the user to be able to sign in via
        email + password.
      operationId: createUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerUserResponse"
          description: The created user.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: "Invalid body (e.g. weak password, malformed email)."
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Missing or invalid secret key.
        "409":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Another user with this email already exists in the environment.
      summary: Create user
      tags:
      - Server Users
  /api/server/v1/users/{userId}/unban:
    post:
      description: Reverses a previous ban. The user can sign in again on next request.
      operationId: unbanUser
      parameters:
      - description: Identifier of the user to unban.
        example: 01931a73-8b00-7000-8000-000000000000
        explode: false
        in: path
        name: userId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerUserResponse"
          description: The (now active) user.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Missing or invalid secret key.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: User belongs to a different environment.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: No user with this id.
      summary: Unban user
      tags:
      - Server Users
  /api/server/v1/users/{userId}/ban:
    post:
      description: Marks the user as banned and revokes all their active sessions.
      operationId: banUser
      parameters:
      - description: Identifier of the user to ban.
        example: 01931a73-8b00-7000-8000-000000000000
        explode: false
        in: path
        name: userId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerUserResponse"
          description: The (now banned) user.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Missing or invalid secret key.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: User belongs to a different environment.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: No user with this id.
      summary: Ban user
      tags:
      - Server Users
  /api/server/v1/users/search:
    post:
      description: "Returns a cursor-paginated page of end-users in the environment\
        \ matching the optional filters. Filters use the same tri-state PATCH semantics\
        \ as `UpdateUserRequest`: omit a field to skip that filter, send a value to\
        \ require it, send null to require null. Uses POST so the filter body can\
        \ be sent without URL-encoding."
      operationId: searchUsers
      parameters:
      - description: Maximum number of items in the returned page (default 20).
        example: 50
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 20
          format: int32
          type: integer
        style: form
      - description: Opaque cursor returned by the previous page's `nextCursor`. Omit
          to fetch the first page.
        example: 01931a73-8b00-7000-8000-000000000000
        explode: true
        in: query
        name: cursor
        required: false
        schema:
          format: uuid
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServerUserSearchRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CursorPageResponseServerUserResponse"
          description: Page of matching users.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Missing or invalid secret key.
      summary: Search users
      tags:
      - Server Users
  /api/server/v1/users/{userId}:
    delete:
      description: "Soft-deletes the user. Not idempotent at the HTTP layer: the authorization\
        \ grant for the user is revoked on the first successful delete, so a subsequent\
        \ DELETE for the same id returns 403 rather than 204. Treat 403 from a retry\
        \ as a confirmation that the user is already deleted."
      operationId: deleteUser
      parameters:
      - description: Identifier of the user to delete.
        example: 01931a73-8b00-7000-8000-000000000000
        explode: false
        in: path
        name: userId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "204":
          description: User deleted.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Missing or invalid secret key.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: User belongs to a different environment.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: No user with this id.
      summary: Delete user
      tags:
      - Server Users
    get:
      description: Returns the full profile for one end-user.
      operationId: getUser
      parameters:
      - description: Identifier of the user to fetch.
        example: 01931a73-8b00-7000-8000-000000000000
        explode: false
        in: path
        name: userId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerUserResponse"
          description: The user.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Missing or invalid secret key.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: User belongs to a different environment.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: No user with this id.
      summary: Get user
      tags:
      - Server Users
    patch:
      description: "Partial update with tri-state PATCH semantics. Every field in\
        \ `UpdateUserRequest` is tri-state: omit the key to leave the field unchanged,\
        \ send a non-null value to set it, or send JSON null to clear it."
      operationId: updateUser
      parameters:
      - description: Identifier of the user to update.
        example: 01931a73-8b00-7000-8000-000000000000
        explode: false
        in: path
        name: userId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerUserResponse"
          description: The updated user.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Invalid body.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Missing or invalid secret key.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: User belongs to a different environment.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: No user with this id.
      summary: Update user
      tags:
      - Server Users
  /api/server/v1/users/{userId}/metadata:
    patch:
      description: "Deep-merges into any of the three metadata bags. Each bag is tri-state:\
        \ omit the key to leave the bag unchanged, or send an object to deep-merge\
        \ into the existing bag (a key set to null removes it). The merged result\
        \ is capped at 512 bytes for `publicMetadata`/`unsafeMetadata` and 4096 bytes\
        \ for `privateMetadata`."
      operationId: updateUserMetadata
      parameters:
      - description: Identifier of the user to update.
        example: 01931a73-8b00-7000-8000-000000000000
        explode: false
        in: path
        name: userId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserMetadataRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerUserResponse"
          description: The updated user.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: A bag exceeds its size limit.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Missing or invalid secret key.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: User belongs to a different environment.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: No user with this id.
      summary: Update user metadata
      tags:
      - Server Users
  /api/server/v1/users/{userId}/sessions:
    delete:
      description: Immediately revokes every active session for the user. Idempotent.
      operationId: revokeAllSessions
      parameters:
      - description: Identifier of the user whose sessions to revoke.
        example: 01931a73-8b00-7000-8000-000000000000
        explode: false
        in: path
        name: userId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "204":
          description: Sessions revoked.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Missing or invalid secret key.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: User belongs to a different environment.
      summary: Revoke all sessions
      tags:
      - Server Sessions
    get:
      description: "Returns all active (unexpired, unrevoked) sessions for the user,\
        \ ordered by most recently used."
      operationId: listSessions
      parameters:
      - description: Identifier of the user whose sessions to list.
        example: 01931a73-8b00-7000-8000-000000000000
        explode: false
        in: path
        name: userId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/UserSessionResponse"
                type: array
          description: All active sessions for the user.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Missing or invalid secret key.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: User belongs to a different environment.
      summary: List user sessions
      tags:
      - Server Sessions
  /api/server/v1/users/{userId}/sessions/{sessionId}:
    delete:
      description: "Revokes a single session by id. Idempotent: returns 204 even if\
        \ the session was already revoked or expired."
      operationId: revokeSession
      parameters:
      - description: Identifier of the user who owns the session.
        example: 01931a73-8b00-7000-8000-000000000000
        explode: false
        in: path
        name: userId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      - description: Identifier of the session to revoke.
        example: 01931a74-1234-7000-8000-000000000000
        explode: false
        in: path
        name: sessionId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "204":
          description: Session revoked.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Missing or invalid secret key.
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: User or session belongs to a different environment.
      summary: Revoke specific session
      tags:
      - Server Sessions
components:
  schemas:
    SetAllowedOriginsRequest:
      example:
        origins:
        - origins
        - origins
      properties:
        origins:
          items:
            type: string
          type: array
      required:
      - origins
    AllowedOriginsResponse:
      example:
        origins:
        - origins
        - origins
      properties:
        origins:
          items:
            type: string
          type: array
      required:
      - origins
    CreateUserRequest:
      description: Request body for creating an end-user in your environment. All
        fields are optional; supply at minimum an email if you want the user to be
        able to sign in via email + password.
      example:
        firstName: Ada
        lastName: Lovelace
        password: correct horse battery staple
        privateMetadata:
          stripeId: cus_123
        unsafeMetadata:
          onboardingStep: 0
        publicMetadata:
          plan: free
        email: ada@example.com
      properties:
        email:
          description: "Primary email for the new user. If omitted, the user is created\
            \ without a sign-in identity."
          example: ada@example.com
          nullable: true
          type: string
        password:
          description: Initial password. Subject to the environment's password policy.
            Omit to create a passwordless user (e.g. social-only).
          example: correct horse battery staple
          nullable: true
          type: string
        firstName:
          description: First (given) name to seed on the profile.
          example: Ada
          nullable: true
          type: string
        lastName:
          description: Last (family) name to seed on the profile.
          example: Lovelace
          nullable: true
          type: string
        publicMetadata:
          additionalProperties: true
          description: "Initial public metadata (SDK-readable, server-written). Max\
            \ 512 bytes."
          example:
            plan: free
          type: object
        privateMetadata:
          additionalProperties: true
          description: Initial private metadata (server-only). Max 4096 bytes.
          example:
            stripeId: cus_123
          type: object
        unsafeMetadata:
          additionalProperties: true
          description: Initial unsafe metadata (end-user writable). Max 512 bytes.
          example:
            onboardingStep: 0
          type: object
      required:
      - privateMetadata
      - publicMetadata
      - unsafeMetadata
    ProblemDetail:
      properties:
        type:
          format: uri
          type: string
        title:
          type: string
        status:
          format: int32
          type: integer
        detail:
          type: string
        instance:
          format: uri
          type: string
        properties:
          additionalProperties: {}
    ServerUserResponse:
      description: "An end-user, including server-only private metadata. Returned\
        \ only on the secret-key backend API."
      example:
        lastName: Lovelace
        privateMetadata:
          stripeId: cus_123
        locale: en
        firstName: Ada
        createdAt: 2026-05-16T09:30:00Z
        deletedAt: 2026-05-20T12:00:00Z
        environmentId: 01931a72-0000-7000-8000-000000000000
        emailVerifiedAt: 2026-05-16T09:35:00Z
        name: Ada Lovelace
        id: 01931a73-8b00-7000-8000-000000000000
        unsafeMetadata:
          onboardingStep: 2
        publicMetadata:
          plan: pro
        email: ada@example.com
        status: active
        updatedAt: 2026-05-16T10:00:00Z
      properties:
        id:
          description: Unique identifier for this user.
          example: 01931a73-8b00-7000-8000-000000000000
          format: uuid
          type: string
        environmentId:
          description: Identifier of the environment this user belongs to.
          example: 01931a72-0000-7000-8000-000000000000
          format: uuid
          type: string
        name:
          description: "Full name on the profile, if any."
          example: Ada Lovelace
          nullable: true
          type: string
        firstName:
          description: "First (given) name on the profile, if any."
          example: Ada
          nullable: true
          type: string
        lastName:
          description: "Last (family) name on the profile, if any."
          example: Lovelace
          nullable: true
          type: string
        locale:
          description: Preferred locale for emails and UI messages.
          enum:
          - en
          - da
          nullable: true
          type: string
        status:
          description: "Lifecycle status of the user (e.g. active, banned)."
          enum:
          - active
          - banned
          - deleted
          type: string
        createdAt:
          description: When this user was created (ISO-8601 UTC).
          example: 2026-05-16T09:30:00Z
          format: date-time
          type: string
        updatedAt:
          description: When this user was last modified (ISO-8601 UTC).
          example: 2026-05-16T10:00:00Z
          format: date-time
          type: string
        email:
          description: "Primary email on the profile, if any."
          example: ada@example.com
          nullable: true
          type: string
        emailVerifiedAt:
          description: "When this user's primary email was verified, if it has been\
            \ verified."
          example: 2026-05-16T09:35:00Z
          format: date-time
          nullable: true
          type: string
        deletedAt:
          description: "When this user was deleted, if soft-deleted. Null for active\
            \ users."
          example: 2026-05-20T12:00:00Z
          format: date-time
          nullable: true
          type: string
        publicMetadata:
          additionalProperties: true
          description: "Public metadata: readable by the SDK, writable only server-side."
          example:
            plan: pro
          type: object
        privateMetadata:
          additionalProperties: true
          description: "Private metadata: server-only. Never exposed to the SDK or\
            \ in a JWT."
          example:
            stripeId: cus_123
          type: object
        unsafeMetadata:
          additionalProperties: true
          description: "Unsafe metadata: readable and writable by the end-user via\
            \ the SDK."
          example:
            onboardingStep: 2
          type: object
      required:
      - createdAt
      - environmentId
      - id
      - privateMetadata
      - publicMetadata
      - status
      - unsafeMetadata
      - updatedAt
    ServerUserSearchRequest:
      description: "Optional filter body for `POST /users/search`. Every field is\
        \ tri-state: omit to skip that filter, send a value to require it. Fields\
        \ whose inner type is nullable (currently `name`, `email`) additionally accept\
        \ JSON null to filter for users where that column is null; the non-nullable\
        \ `statuses` field rejects null."
      example:
        name: Ada
        statuses:
        - active
        - active
        createdBefore: 2026-12-31T23:59:59Z
        createdAfter: 2026-01-01T00:00:00Z
        email: '@example.com'
      properties:
        name:
          description: Filter by name (case-insensitive substring match). Send null
            to require users with no name.
          example: Ada
          nullable: true
          type: string
        email:
          description: Filter by primary email (case-insensitive substring match).
            Send null to require users with no email.
          example: '@example.com'
          nullable: true
          type: string
        statuses:
          description: Filter by user status. Returns users matching any of the supplied
            statuses.
          items:
            enum:
            - active
            - banned
            - deleted
            type: string
          type: array
          uniqueItems: true
        createdAfter:
          description: Only return users created at or after this instant (ISO-8601
            UTC).
          example: 2026-01-01T00:00:00Z
          format: date-time
          nullable: true
          type: string
        createdBefore:
          description: Only return users created at or before this instant (ISO-8601
            UTC).
          example: 2026-12-31T23:59:59Z
          format: date-time
          nullable: true
          type: string
    CursorPageResponseServerUserResponse:
      description: A single page of results in a cursor-paginated list. Pass `nextCursor`
        as the `cursor` query parameter to fetch the following page.
      example:
        nextCursor: 01931a73-8b00-7000-8000-000000000000
        hasMore: true
        items:
        - lastName: Lovelace
          privateMetadata:
            stripeId: cus_123
          locale: en
          firstName: Ada
          createdAt: 2026-05-16T09:30:00Z
          deletedAt: 2026-05-20T12:00:00Z
          environmentId: 01931a72-0000-7000-8000-000000000000
          emailVerifiedAt: 2026-05-16T09:35:00Z
          name: Ada Lovelace
          id: 01931a73-8b00-7000-8000-000000000000
          unsafeMetadata:
            onboardingStep: 2
          publicMetadata:
            plan: pro
          email: ada@example.com
          status: active
          updatedAt: 2026-05-16T10:00:00Z
        - lastName: Lovelace
          privateMetadata:
            stripeId: cus_123
          locale: en
          firstName: Ada
          createdAt: 2026-05-16T09:30:00Z
          deletedAt: 2026-05-20T12:00:00Z
          environmentId: 01931a72-0000-7000-8000-000000000000
          emailVerifiedAt: 2026-05-16T09:35:00Z
          name: Ada Lovelace
          id: 01931a73-8b00-7000-8000-000000000000
          unsafeMetadata:
            onboardingStep: 2
          publicMetadata:
            plan: pro
          email: ada@example.com
          status: active
          updatedAt: 2026-05-16T10:00:00Z
      properties:
        items:
          description: "Items in this page, in stable order."
          items:
            $ref: "#/components/schemas/ServerUserResponse"
          type: array
        nextCursor:
          description: Cursor to pass to fetch the next page. Null when this is the
            last page.
          example: 01931a73-8b00-7000-8000-000000000000
          format: uuid
          nullable: true
          type: string
        hasMore:
          description: True if more pages are available (equivalent to `nextCursor
            != null`).
          example: true
          type: boolean
      required:
      - hasMore
      - items
    UpdateUserRequest:
      description: "PATCH body for updating an end-user. Every field is tri-state:\
        \ omit the key entirely to leave the field unchanged, send a non-null value\
        \ to set it, or send JSON null to clear it."
      example:
        firstName: Ada
        lastName: Lovelace
        locale: en
        unsafeMetadata:
          onboardingStep: 2
      properties:
        firstName:
          description: New first (given) name. Send null to clear; omit to leave unchanged.
          example: Ada
          nullable: true
          type: string
        lastName:
          description: New last (family) name. Send null to clear; omit to leave unchanged.
          example: Lovelace
          nullable: true
          type: string
        locale:
          description: New preferred locale. Send null to clear; omit to leave unchanged.
          enum:
          - en
          - da
          nullable: true
          type: string
        unsafeMetadata:
          additionalProperties: true
          description: Deep-merges into the user's unsafe metadata (a key set to null
            removes it); omit to leave unchanged. Merged result max 512 bytes.
          example:
            onboardingStep: 2
          type: object
    UpdateUserMetadataRequest:
      description: "PATCH body for a user's metadata bags. Each bag is tri-state:\
        \ omit to leave it unchanged, or send an object value. Whether the object\
        \ merges into or replaces the bag depends on the endpoint (see its operation\
        \ description)."
      example:
        privateMetadata:
          stripeId: cus_123
        unsafeMetadata:
          onboardingStep: 2
        publicMetadata:
          plan: pro
      properties:
        publicMetadata:
          additionalProperties: true
          description: "Public metadata bag: SDK-readable, server-written. Max 512\
            \ bytes."
          example:
            plan: pro
          type: object
        privateMetadata:
          additionalProperties: true
          description: "Private metadata bag: server-only, never exposed to the SDK\
            \ or in a JWT. Max 4096 bytes."
          example:
            stripeId: cus_123
          type: object
        unsafeMetadata:
          additionalProperties: true
          description: "Unsafe metadata bag: readable and writable by the end-user\
            \ via the SDK. Max 512 bytes."
          example:
            onboardingStep: 2
          type: object
    UserSessionResponse:
      description: An active end-user session in your environment.
      example:
        createdAt: 2026-05-16T09:30:00Z
        environmentId: 01931a72-0000-7000-8000-000000000000
        lastUsedAt: 2026-05-16T11:42:00Z
        ipAddress: 203.0.113.42
        userAgent: Mozilla/5.0 (Macintosh; Intel Mac OS X 14_6_0) AppleWebKit/537.36
        activeOrganizationId: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        id: 01931a74-1234-7000-8000-000000000000
        impersonatedBy: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        userId: 01931a73-8b00-7000-8000-000000000000
        expiresAt: 2026-05-23T09:30:00Z
      properties:
        id:
          description: Unique identifier for this session.
          example: 01931a74-1234-7000-8000-000000000000
          format: uuid
          type: string
        userId:
          description: Identifier of the end-user this session belongs to.
          example: 01931a73-8b00-7000-8000-000000000000
          format: uuid
          type: string
        environmentId:
          description: Identifier of the environment this session belongs to.
          example: 01931a72-0000-7000-8000-000000000000
          format: uuid
          type: string
        userAgent:
          description: Raw User-Agent string captured when the session was created.
          example: Mozilla/5.0 (Macintosh; Intel Mac OS X 14_6_0) AppleWebKit/537.36
          nullable: true
          type: string
        ipAddress:
          description: IP address captured when the session was created.
          example: 203.0.113.42
          nullable: true
          type: string
        createdAt:
          description: When this session was created (ISO-8601 UTC).
          example: 2026-05-16T09:30:00Z
          format: date-time
          type: string
        expiresAt:
          description: When this session expires (ISO-8601 UTC).
          example: 2026-05-23T09:30:00Z
          format: date-time
          type: string
        lastUsedAt:
          description: When this session was last seen by the API (ISO-8601 UTC).
          example: 2026-05-16T11:42:00Z
          format: date-time
          type: string
        activeOrganizationId:
          description: Active organization pinned to this session (`org_id` claim
            on re-mint).
          format: uuid
          nullable: true
          type: string
        impersonatedBy:
          description: Platform user behind this session when it was established via
            impersonation; null for normal sign-ins.
          format: uuid
          nullable: true
          type: string
      required:
      - createdAt
      - environmentId
      - expiresAt
      - id
      - lastUsedAt
      - userId
